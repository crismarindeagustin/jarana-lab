<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f2f0eb;
    --gray-border: #3a3a3a;
    --poesia: #7B4FD4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    background: rgba(10,10,10,0.88);
    backdrop-filter: blur(10px);
    border-bottom: 0.5px solid var(--gray-border);
  }

  .nav-logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    letter-spacing: -1px;
    color: var(--white);
    text-transform: lowercase;
    text-decoration: none;
  }
  .nav-logo span { opacity: 0.35; }

  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(242,240,235,0.5);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-links a.active { color: var(--poesia); }

  .page-header {
    padding: 140px 48px 64px;
    border-bottom: 0.5px solid var(--gray-border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .page-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(48px, 10vw, 120px);
    text-transform: lowercase;
    letter-spacing: -3px;
    line-height: 0.9;
    color: var(--poesia);
  }

  .links-section {
    padding: 80px 48px;
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--gray-border);
  }

  .ext-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 36px 48px;
    background: var(--black);
    text-decoration: none;
    color: var(--white);
    transition: background 0.3s ease;
    margin: 0 -48px;
  }
  .ext-link:hover { background: #111; }

  .ext-link-left { display: flex; flex-direction: column; gap: 6px; }

  .ext-link-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 28px;
    text-transform: lowercase;
    letter-spacing: -1px;
    color: var(--poesia);
    transition: letter-spacing 0.3s ease;
  }
  .ext-link:hover .ext-link-name { letter-spacing: -0.3px; }

  .ext-link-desc {
    font-size: 13px;
    color: rgba(242,240,235,0.4);
    letter-spacing: 0.5px;
  }

  .ext-link-arrow {
    font-size: 20px;
    color: rgba(242,240,235,0.2);
    transition: color 0.3s, transform 0.3s;
    flex-shrink: 0;
  }
  .ext-link:hover .ext-link-arrow {
    color: var(--poesia);
    transform: translate(4px, -4px);
  }

  footer {
    padding: 40px 48px;
    border-top: 0.5px solid var(--gray-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: auto;
  }

  .footer-logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px;
    text-transform: lowercase;
    color: var(--white);
    text-decoration: none;
  }
  .footer-logo span { opacity: 0.35; }
  .footer-copy { font-size: 12px; color: rgba(242,240,235,0.3); }

  @media (max-width: 640px) {
    nav { padding: 18px 24px; }
    .nav-links { display: none; }
    .page-header { padding: 120px 24px 48px; }
    footer { padding: 32px 24px; }
  }
</style>
</head>
<body>

<nav>

      <span class="ext-link-desc">instagram · poesía y textos</span>
    </div>
    <span class="ext-link-arrow">↗</span>
  </a>
  <a href="https://substack.com/@crismarindea" target="_blank" rel="noopener" class="ext-link">

      <span class="ext-link-name">substack</span>
      <span class="ext-link-desc">substack · escritura larga</span>
    </div>
    <span class="ext-link-arrow">↗</span>

</section>

<footer>
  <a href="../index.html" class="footer-logo">jarana<span> lab</span></a>
  <p class="footer-copy">© 2026 jarana lab.</p>
</footer>

</body>
</html>
