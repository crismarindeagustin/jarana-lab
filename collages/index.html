<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>collages — jarana lab</title>
<meta name="description" content="Composiciones visuales. jarana lab.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --black-soft: #1a1a1a;
    --white: #f2f0eb;
    --gray-border: #3a3a3a;
    --collage: #E8430A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  .cursor {
    width: 10px; height: 10px;
    background: var(--collage);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, opacity 0.2s;
  }
  .cursor.hovered { width: 36px; height: 36px; opacity: 0.4; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    background: rgba(10,10,10,0.88);
    backdrop-filter: blur(10px);
    border-bottom: 0.5px solid var(--gray-border);
  }

  .nav-logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    letter-spacing: -1px;
    color: var(--white);
    text-transform: lowercase;
    text-decoration: none;
  }
  .nav-logo span { opacity: 0.35; }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }
  .nav-links a {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(242,240,235,0.5);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-links a.active { color: var(--collage); }

  /* HEADER */
  .page-header {
    padding: 140px 48px 64px;
    border-bottom: 0.5px solid var(--gray-border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .page-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(48px, 10vw, 120px);
    text-transform: lowercase;
    letter-spacing: -3px;
    line-height: 0.9;
    color: var(--collage);
  }

  .page-count {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(242,240,235,0.3);
    padding-bottom: 8px;
  }

  /* SCATTERED LAYOUT */
  .scatter-wrap {
    padding: 60px 48px 100px;
    position: relative;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: auto;
    gap: 0;
    row-gap: 48px;
    align-items: start;
  }

  .collage-piece {
    display: block;
    position: relative;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .collage-piece.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .collage-piece:nth-child(1) {
    grid-column: 1 / 6;
    margin-top: 0;
  }
  .collage-piece:nth-child(2) {
    grid-column: 7 / 12;
    margin-top: 80px;
  }
  .collage-piece:nth-child(3) {
    grid-column: 2 / 7;
    margin-top: -40px;
  }
  .collage-piece:nth-child(4) {
    grid-column: 8 / 13;
    margin-top: 40px;
  }

  .collage-piece img {
    width: 100%;
    display: block;
    object-fit: cover;
  }

  .collage-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0 0;
  }

  .collage-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    text-transform: lowercase;
    letter-spacing: -0.3px;
    color: var(--white);
  }

  .collage-num {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(242,240,235,0.3);
  }

  /* FOOTER */
  footer {
    padding: 40px 48px;
    border-top: 0.5px solid var(--gray-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .footer-logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px;
    text-transform: lowercase;
    color: var(--white);
    text-decoration: none;
  }
  .footer-logo span { opacity: 0.35; }
  .footer-copy { font-size: 12px; color: rgba(242,240,235,0.3); }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    nav { padding: 18px 24px; }
    .nav-links { display: none; }
    .page-header { padding: 120px 24px 48px; }
    footer { padding: 32px 24px; }

    .scatter-wrap {
      padding: 48px 24px 80px;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      row-gap: 24px;
    }
    .collage-piece:nth-child(1) { grid-column: 1 / 2; margin-top: 0; }
    .collage-piece:nth-child(2) { grid-column: 2 / 3; margin-top: 32px; }
    .collage-piece:nth-child(3) { grid-column: 1 / 2; margin-top: 0; }
    .collage-piece:nth-child(4) { grid-column: 2 / 3; margin-top: 32px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .collage-piece { opacity: 1; transform: none; transition: none; }
    .cursor { display: none; }
    body { cursor: auto; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<nav>
  <a href="../index.html" class="nav-logo">jarana<span> lab</span></a>
  <ul class="nav-links">
    <li><a href="../index.html">inicio</a></li>
    <li><a href="#" class="active">collages</a></li>
    <li><a href="../poesia/">textos</a></li>
    <li><a href="../podcast/">pódcast</a></li>
    <li><a href="../index.html#sobre">sobre</a></li>
  </ul>
</nav>

<header class="page-header">
  <h1 class="page-title">collages</h1>
  <span class="page-count">4 piezas</span>
</header>

<main class="scatter-wrap">

  <div class="collage-piece">
    <img src="Bruselas.jpg" alt="Bruselas">
    <div class="collage-label">
      <span class="collage-name">bruselas</span>
      <span class="collage-num">01</span>
    </div>
  </div>

  <div class="collage-piece">
    <img src="Cuenca_1.jpg" alt="Cuenca I">
    <div class="collage-label">
      <span class="collage-name">cuenca I</span>
      <span class="collage-num">02</span>
    </div>
  </div>

  <div class="collage-piece">
    <img src="Cuenca_2.jpg" alt="Cuenca II">
    <div class="collage-label">
      <span class="collage-name">cuenca II</span>
      <span class="collage-num">03</span>
    </div>
  </div>

  <div class="collage-piece">
    <img src="Genova.jpg" alt="Génova">
    <div class="collage-label">
      <span class="collage-name">génova</span>
      <span class="collage-num">04</span>
    </div>
  </div>

</main>

<footer>
  <a href="../index.html" class="footer-logo">jarana<span> lab</span></a>
  <p class="footer-copy">© 2026 jarana lab.</p>
</footer>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
  });

  // Scroll reveal
  const pieces = document.querySelectorAll('.collage-piece');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.1 });
  pieces.forEach(p => obs.observe(p));
</script>

</body>
</html>
