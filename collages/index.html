<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>collages — jarana lab</title>
<meta name="description" content="Composiciones visuales. jarana lab.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --black-soft: #1a1a1a;
    --white: #f2f0eb;
    --gray-border: #3a3a3a;
    --collage: #E8430A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  .cursor {
    width: 10px;
    height: 10px;
    background: var(--collage);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, opacity 0.2s;
    mix-blend-mode: normal;
  }
  .cursor.hovered { width: 36px; height: 36px; opacity: 0.4; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    background: rgba(10,10,10,0.88);
    backdrop-filter: blur(10px);
    border-bottom: 0.5px solid var(--gray-border);
  }

  .nav-logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    letter-spacing: -1px;
    color: var(--white);
    text-transform: lowercase;
    text-decoration: none;
  }
  .nav-logo span { opacity: 0.35; }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(242,240,235,0.5);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-links a.active { color: var(--collage); }

  /* HEADER */
  .page-header {
    padding: 140px 48px 64px;
    border-bottom: 0.5px solid var(--gray-border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .page-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(48px, 10vw, 120px);
    text-transform: lowercase;
    letter-spacing: -3px;
    line-height: 0.9;
    color: var(--collage);
  }

  .page-count {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(242,240,235,0.3);
    padding-bottom: 8px;
  }

  /* GALLERY */
  .gallery {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: var(--gray-border);
  }

  .gallery-item {
    position: relative;
    overflow: hidden;
    aspect-ratio: 4/3;
    background: var(--black-soft);
    cursor: none;
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.4s ease;
    filter: grayscale(0%);
  }

  .gallery-item:hover img {
    transform: scale(1.04);
  }

  .gallery-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 48px 28px 28px;
    background: linear-gradient(to top, rgba(10,10,10,0.85) 0%, transparent 100%);
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .gallery-item:hover .gallery-caption {
    transform: translateY(0);
  }

  .caption-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 22px;
    text-transform: lowercase;
    letter-spacing: -0.5px;
    color: var(--white);
  }

  .caption-num {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(242,240,235,0.4);
  }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(10,10,10,0.96);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .lightbox.open {
    opacity: 1;
    pointer-events: all;
  }

  .lightbox img {
    max-width: 90vw;
    max-height: 88vh;
    object-fit: contain;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    transform: scale(0.96);
  }
  .lightbox.open img { transform: scale(1); }

  .lightbox-close {
    position: absolute;
    top: 32px; right: 48px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(242,240,235,0.4);
    background: none;
    border: none;
    cursor: none;
    transition: color 0.2s;
  }
  .lightbox-close:hover { color: var(--white); }

  .lightbox-name {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    text-transform: lowercase;
    letter-spacing: -0.5px;
    color: rgba(242,240,235,0.5);
    white-space: nowrap;
  }

  /* FOOTER */
  footer {
    padding: 40px 48px;
    border-top: 0.5px solid var(--gray-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .footer-logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px;
    text-transform: lowercase;
    color: var(--white);
    text-decoration: none;
  }
  .footer-logo span { opacity: 0.35; }

  .footer-copy {
    font-size: 12px;
    color: rgba(242,240,235,0.3);
  }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    nav { padding: 18px 24px; }
    .nav-links { display: none; }
    .page-header { padding: 120px 24px 48px; }
    .gallery { grid-template-columns: 1fr; }
    footer { padding: 32px 24px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .gallery-item img { transition: none; }
    .gallery-caption { transition: none; }
    .cursor { display: none; }
    body { cursor: auto; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lbClose">cerrar ✕</button>
  <img src="" id="lbImg" alt="">
  <span class="lightbox-name" id="lbName"></span>
</div>

<nav>
  <a href="../index.html" class="nav-logo">jarana<span> lab</span></a>
  <ul class="nav-links">
    <li><a href="../index.html">inicio</a></li>
    <li><a href="#" class="active">collages</a></li>
    <li><a href="../poesia/">poesía</a></li>
    <li><a href="../podcast/">pódcast</a></li>
    <li><a href="../index.html#sobre">sobre</a></li>
  </ul>
</nav>

<header class="page-header">
  <h1 class="page-title">collages</h1>
  <span class="page-count">4 piezas</span>
</header>

<main class="gallery">

  <div class="gallery-item" data-name="bruselas" data-src="Bruselas.jpg">
    <img src="Bruselas.jpg" alt="Bruselas">
    <div class="gallery-caption">
      <span class="caption-name">bruselas</span>
      <span class="caption-num">01</span>
    </div>
  </div>

  <div class="gallery-item" data-name="cuenca i" data-src="Cuenca_1.jpg">
    <img src="Cuenca_1.jpg" alt="Cuenca I">
    <div class="gallery-caption">
      <span class="caption-name">cuenca i</span>
      <span class="caption-num">02</span>
    </div>
  </div>

  <div class="gallery-item" data-name="cuenca ii" data-src="Cuenca_2.jpg">
    <img src="Cuenca_2.jpg" alt="Cuenca II">
    <div class="gallery-caption">
      <span class="caption-name">cuenca ii</span>
      <span class="caption-num">03</span>
    </div>
  </div>

  <div class="gallery-item" data-name="génova" data-src="Genova.jpg">
    <img src="Genova.jpg" alt="Génova">
    <div class="gallery-caption">
      <span class="caption-name">génova</span>
      <span class="caption-num">04</span>
    </div>
  </div>

</main>

<footer>
  <a href="../index.html" class="footer-logo">jarana<span> lab</span></a>
  <p class="footer-copy">© 2026 jarana lab.</p>
</footer>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a, button, .gallery-item').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
  });

  // Lightbox
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lbImg');
  const lbName = document.getElementById('lbName');
  const lbClose = document.getElementById('lbClose');

  document.querySelectorAll('.gallery-item').forEach(item => {
    item.addEventListener('click', () => {
      lbImg.src = item.dataset.src;
      lbName.textContent = item.dataset.name;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    });
  });

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>

</body>
</html>
