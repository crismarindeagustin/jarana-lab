<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>collages — jarana lab</title>
<meta name="description" content="Composiciones visuales. jarana lab.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --black-soft: #1a1a1a;
    --white: #f2f0eb;
    --gray-border: #3a3a3a;
    --collage: #E8430A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  .cursor {
    width: 10px; height: 10px;
    background: var(--collage);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, opacity 0.2s;
  }
  .cursor.hovered { width: 36px; height: 36px; opacity: 0.4; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    background: rgba(10,10,10,0.88);
    backdrop-filter: blur(10px);
    border-bottom: 0.5px solid var(--gray-border);
  }

  .nav-logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 20px;
    letter-spacing: -1px;
    color: var(--white);
    text-transform: lowercase;
    text-decoration: none;
  }
  .nav-logo span { opacity: 0.35; }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }
  .nav-links a {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(242,240,235,0.5);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-links a.active { color: var(--collage); }

  /* HEADER */
  .page-header {
    padding: 140px 48px 64px;
    border-bottom: 0.5px solid var(--gray-border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .page-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(48px, 10vw, 120px);
    text-transform: lowercase;
    letter-spacing: -3px;
    line-height: 0.9;
    color: var(--collage);
  }

  .page-count {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(242,240,235,0.3);
    padding-bottom: 8px;
  }

  /* SCATTERED LAYOUT */
  .scatter-wrap {
    padding: 60px 48px 100px;
    position: relative;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: auto;
    gap: 0;
    row-gap: 48px;
    align-items: start;
  }

  .collage-piece {
    display: block;
    position: relative;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .collage-piece.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .collage-piece:nth-child(1) {
    grid-column: 1 / 6;
    margin-top: 0;
  }
  .collage-piece:nth-child(2) {
    grid-column: 7 / 12;
    margin-top: 80px;
  }
  .collage-piece:nth-child(3) {
    grid-column: 2 / 7;
    margin-top: -40px;
  }
  .collage-piece:nth-child(4) {
    grid-column: 8 / 13;
    margin-top: 40px;
  }

  .collage-piece img {
    width: 100%;
    display: block;
    object-fit: cover;
  }

  .collage-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0 0;
  }

  .collage-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    text-transform: lowercase;
    letter-spacing: -0.3px;
    color: var(--white);
  }

  .collage-num {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(242,240,235,0.3);
  }

  /* FOOTER */
  footer {
    padding: 40px 48px;
    border-top: 0.5px solid var(--gray-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .footer-logo {
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px;
    text-transform: lowercase;
    color: var(--white);
    text-decoration: none;
  }
  .footer-logo span { opacity: 0.35; }
  .footer-copy { font-size: 12px; color: rgba(242,240,235,0.3); }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    nav { padding: 18px 24px; }
    .nav-links { display: none; }
    .page-header { padding: 120px 24px 48px; }
    footer { padding: 32px 24px; }

    .scatter-wrap {
      padding: 48px 24px 80px;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      row-gap: 24px;
    }
    .collage-piece:nth-child(1) { grid-column: 1 / 2; margin-top: 0; }
    .collage-piece:nth-child(2) { grid-column: 2 / 3; margin-top: 32px; }
    .collage-piece:nth-child(3) { grid-column: 1 / 2; margin-top: 0; }
    .collage-piece:nth-child(4) { grid-column: 2 / 3; margin-top: 32px; }
  }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(10,10,10,0.96);
    align-items: center;
    justify-content: center;
    cursor: none;
  }
  .lightbox.open { display: flex; }

  .lightbox-inner {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .lightbox img {
    max-width: 90vw;
    max-height: 90vh;
    object-fit: contain;
    display: block;
    transform-origin: center center;
    transition: transform 0.1s ease;
    user-select: none;
    cursor: none;
  }

  .lightbox-close {
    position: fixed;
    top: 24px;
    right: 32px;
    background: none;
    border: none;
    color: rgba(242,240,235,0.6);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: none;
    padding: 8px;
    transition: color 0.2s;
    z-index: 1001;
  }
  .lightbox-close:hover { color: var(--white); }

  .lightbox-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: rgba(242,240,235,0.4);
    font-family: 'Archivo Black', sans-serif;
    font-size: 24px;
    cursor: none;
    padding: 16px;
    transition: color 0.2s;
    z-index: 1001;
  }
  .lightbox-nav:hover { color: var(--white); }
  .lightbox-prev { left: 16px; }
  .lightbox-next { right: 16px; }

  .lightbox-info {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 16px;
    z-index: 1001;
  }
  .lightbox-name {
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    text-transform: lowercase;
    color: var(--white);
  }
  .lightbox-counter {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(242,240,235,0.35);
  }
  .lightbox-zoom-hint {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(242,240,235,0.25);
    margin-left: 8px;
  }

  .collage-piece {
    cursor: none;
  }
  .collage-piece img {
    transition: opacity 0.25s ease;
  }
  .collage-piece:hover img {
    opacity: 0.8;
  }

  @media (max-width: 640px) {
    .lightbox-nav { font-size: 18px; padding: 12px; }
    .lightbox-prev { left: 4px; }
    .lightbox-next { right: 4px; }
    .lightbox-zoom-hint { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    .collage-piece { opacity: 1; transform: none; transition: none; }
    .cursor { display: none; }
    body { cursor: auto; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<nav>
  <a href="../index.html" class="nav-logo">jarana<span> lab</span></a>
  <ul class="nav-links">
    <li><a href="../index.html">inicio</a></li>
    <li><a href="#" class="active">collages</a></li>
    <li><a href="../poesia/">textos</a></li>
    <li><a href="../podcast/">pódcast</a></li>
    <li><a href="../index.html#sobre">sobre</a></li>
  </ul>
</nav>

<header class="page-header">
  <h1 class="page-title">collages</h1>
  <span class="page-count">4 piezas</span>
</header>

<main class="scatter-wrap">

  <div class="collage-piece" data-index="0">
    <img src="Bruselas.jpg" alt="Bruselas">
    <div class="collage-label">
      <span class="collage-name">bruselas</span>
      <span class="collage-num">01</span>
    </div>
  </div>

  <div class="collage-piece" data-index="1">
    <img src="Cuenca_1.jpg" alt="Cuenca I">
    <div class="collage-label">
      <span class="collage-name">cuenca I</span>
      <span class="collage-num">02</span>
    </div>
  </div>

  <div class="collage-piece" data-index="2">
    <img src="Cuenca_2.jpg" alt="Cuenca II">
    <div class="collage-label">
      <span class="collage-name">cuenca II</span>
      <span class="collage-num">03</span>
    </div>
  </div>

  <div class="collage-piece" data-index="3">
    <img src="Genova.jpg" alt="Génova">
    <div class="collage-label">
      <span class="collage-name">génova</span>
      <span class="collage-num">04</span>
    </div>
  </div>

</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <div class="lightbox-inner" id="lightboxInner">
    <img src="" alt="" id="lightboxImg">
  </div>
  <button class="lightbox-close" id="lightboxClose">cerrar ✕</button>
  <button class="lightbox-nav lightbox-prev" id="lightboxPrev">&#8592;</button>
  <button class="lightbox-nav lightbox-next" id="lightboxNext">&#8594;</button>
  <div class="lightbox-info">
    <span class="lightbox-name" id="lightboxName"></span>
    <span class="lightbox-counter" id="lightboxCounter"></span>
    <span class="lightbox-zoom-hint">scroll para zoom</span>
  </div>
</div>

<footer>
  <a href="../index.html" class="footer-logo">jarana<span> lab</span></a>
  <p class="footer-copy">© 2026 jarana lab.</p>
</footer>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });
  document.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
  });

  // Scroll reveal
  const pieces = document.querySelectorAll('.collage-piece');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.1 });
  pieces.forEach(p => obs.observe(p));

  // Lightbox
  const collages = [
    { src: 'Bruselas.jpg', name: 'bruselas' },
    { src: 'Cuenca_1.jpg', name: 'cuenca I' },
    { src: 'Cuenca_2.jpg', name: 'cuenca II' },
    { src: 'Genova.jpg',   name: 'génova' },
  ];

  const lightbox    = document.getElementById('lightbox');
  const lbImg       = document.getElementById('lightboxImg');
  const lbName      = document.getElementById('lightboxName');
  const lbCounter   = document.getElementById('lightboxCounter');
  const lbClose     = document.getElementById('lightboxClose');
  const lbPrev      = document.getElementById('lightboxPrev');
  const lbNext      = document.getElementById('lightboxNext');
  const lbInner     = document.getElementById('lightboxInner');

  let current = 0;
  let scale = 1;
  let panX = 0, panY = 0;
  let isPanning = false;
  let panStart = { x: 0, y: 0 };

  function resetTransform() {
    scale = 1; panX = 0; panY = 0;
    applyTransform();
  }

  function applyTransform() {
    lbImg.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
  }

  function openLightbox(index) {
    current = index;
    resetTransform();
    lbImg.src = collages[current].src;
    lbImg.alt = collages[current].name;
    lbName.textContent = collages[current].name;
    lbCounter.textContent = `${current + 1} / ${collages.length}`;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    resetTransform();
  }

  function goTo(index) {
    current = (index + collages.length) % collages.length;
    resetTransform();
    lbImg.src = collages[current].src;
    lbImg.alt = collages[current].name;
    lbName.textContent = collages[current].name;
    lbCounter.textContent = `${current + 1} / ${collages.length}`;
  }

  pieces.forEach(piece => {
    piece.addEventListener('click', () => openLightbox(+piece.dataset.index));
  });

  lbClose.addEventListener('click', closeLightbox);
  lbPrev.addEventListener('click', () => goTo(current - 1));
  lbNext.addEventListener('click', () => goTo(current + 1));

  // Close on backdrop click
  lightbox.addEventListener('click', e => {
    if (e.target === lightbox || e.target === lbInner) closeLightbox();
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
  });

  // Wheel zoom
  lbInner.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY < 0 ? 0.15 : -0.15;
    scale = Math.min(5, Math.max(1, scale + delta));
    if (scale === 1) { panX = 0; panY = 0; }
    applyTransform();
  }, { passive: false });

  // Mouse pan
  lbImg.addEventListener('mousedown', e => {
    if (scale <= 1) return;
    isPanning = true;
    panStart = { x: e.clientX - panX, y: e.clientY - panY };
    lbImg.style.cursor = 'grabbing';
  });
  document.addEventListener('mousemove', e => {
    if (!isPanning) return;
    panX = e.clientX - panStart.x;
    panY = e.clientY - panStart.y;
    applyTransform();
  });
  document.addEventListener('mouseup', () => {
    isPanning = false;
    lbImg.style.cursor = 'none';
  });

  // Touch pinch zoom
  let lastDist = null;
  lbInner.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      lastDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  });
  lbInner.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      if (lastDist) {
        const ratio = dist / lastDist;
        scale = Math.min(5, Math.max(1, scale * ratio));
        if (scale === 1) { panX = 0; panY = 0; }
        applyTransform();
      }
      lastDist = dist;
    }
  }, { passive: false });
  lbInner.addEventListener('touchend', () => { lastDist = null; });

  // Double-tap to reset zoom
  let lastTap = 0;
  lbInner.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 300) { resetTransform(); }
    lastTap = now;
  });
</script>

</body>
</html>
